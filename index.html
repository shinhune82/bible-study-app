// 수동 크롭 모달 - 드래그로 영역 선택
function ManualCropModal({ imageUrl, onConfirm, onCancel }) {
  const imgRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const [start, setStart] = React.useState(null);
  const [rect, setRect] = React.useState(null);

  // window에 mousemove/mouseup 등록 → 이미지 밖으로 벗어나도 잡힘
  React.useEffect(() => {
    const handleMove = (e) => {
      if (!dragging || !start || !imgRef.current) return;
      const b = imgRef.current.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const cx = Math.max(0, Math.min(1, (clientX - b.left) / b.width));
      const cy = Math.max(0, Math.min(1, (clientY - b.top) / b.height));
      setRect({
        x: Math.min(start.x, cx),
        y: Math.min(start.y, cy),
        w: Math.abs(cx - start.x),
        h: Math.abs(cy - start.y),
      });
    };
    const handleUp = () => setDragging(false);

    window.addEventListener("mousemove", handleMove);
    window.addEventListener("mouseup", handleUp);
    window.addEventListener("touchmove", handleMove, { passive: true });
    window.addEventListener("touchend", handleUp);
    return () => {
      window.removeEventListener("mousemove", handleMove);
      window.removeEventListener("mouseup", handleUp);
      window.removeEventListener("touchmove", handleMove);
      window.removeEventListener("touchend", handleUp);
    };
  }, [dragging, start]);

  const onMouseDown = (e) => {
    e.preventDefault();
    if (!imgRef.current) return;
    const b = imgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const pos = {
      x: Math.max(0, Math.min(1, (clientX - b.left) / b.width)),
      y: Math.max(0, Math.min(1, (clientY - b.top) / b.height)),
    };
    setStart(pos);
    setRect(null);
    setDragging(true);
  };

  const confirm = () => {
    if (!rect || rect.w < 0.01 || rect.h < 0.01) return;
    onConfirm(rect);
  };

  const hasSelection = rect && rect.w > 0.01 && rect.h > 0.01;

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 1000, display: "flex", flexDirection: "column", alignItems: "center" }}>
      {/* 헤더 - 고정 */}
      <div style={{ width: "100%", maxWidth: 430, background: "#2d4a3e", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <span style={{ color: "#e8dcc8", fontSize: 13, fontWeight: 700, fontFamily: "sans-serif" }}>✂️ 직접 영역 선택</span>
        <button onClick={onCancel} style={{ background: "none", border: "none", color: "#e8dcc8", fontSize: 18, cursor: "pointer" }}>✕</button>
      </div>
      {/* 안내 - 고정 */}
      <div style={{ width: "100%", maxWidth: 430, padding: "8px 16px", background: "#243d33", fontSize: 11, color: "#a0c8b8", fontFamily: "sans-serif", flexShrink: 0 }}>
        {hasSelection ? "✅ 영역이 선택됐어요. 아래 버튼으로 크롭하세요." : "원하는 그림 영역을 드래그해서 선택하세요"}
      </div>
      {/* 이미지 - 스크롤 가능 */}
      <div style={{ width: "100%", maxWidth: 430, flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
        <div
          ref={imgRef}
          style={{ position: "relative", cursor: "crosshair", userSelect: "none", touchAction: "none" }}
          onMouseDown={onMouseDown}
          onTouchStart={onMouseDown}
        >
          <img src={imageUrl} alt="원본" style={{ width: "100%", display: "block", pointerEvents: "none" }} />
          {rect && rect.w > 0.005 && (
            <div style={{
              position: "absolute",
              left: (rect.x * 100) + "%",
              top: (rect.y * 100) + "%",
              width: (rect.w * 100) + "%",
              height: (rect.h * 100) + "%",
              border: "2.5px solid #f0c040",
              background: "rgba(240,192,64,0.15)",
              boxSizing: "border-box",
              pointerEvents: "none",
              boxShadow: "0 0 0 9999px rgba(0,0,0,0.45)",
            }} />
          )}
        </div>
      </div>
      {/* 버튼 - 고정 하단 */}
      <div style={{ width: "100%", maxWidth: 430, padding: "12px 16px", display: "flex", gap: 8, background: "#1a2e26", flexShrink: 0 }}>
        <button
          onClick={confirm}
          disabled={!hasSelection}
          style={{
            flex: 1, padding: "13px", borderRadius: 10,
            background: hasSelection ? "linear-gradient(135deg,#2d4a3e,#4a7c68)" : "#2a3a30",
            color: hasSelection ? "#e8dcc8" : "#5a7a68",
            border: "none", fontSize: 14, fontWeight: 700,
            cursor: hasSelection ? "pointer" : "not-allowed",
            fontFamily: "sans-serif", transition: "all 0.2s"
          }}>
          ✅ 이 영역으로 크롭
        </button>
        <button onClick={onCancel} style={{ padding: "13px 16px", borderRadius: 10, background: "#3a3a3a", color: "#aaa", border: "none", fontSize: 14, cursor: "pointer", fontFamily: "sans-serif" }}>
          취소
        </button>
      </div>
    </div>
  );
}

// HTML → 텍스트 변환 유틸
function htmlToPlain(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.innerText || d.textContent || "";
}

// 서식 툴바 컴포넌트
function FormatToolbar({ editRef, onSave, onCancel }) {
  const COLORS = [
    { label: "기본", value: "#2a1f14" },
    { label: "빨강", value: "#c0392b" },
    { label: "파랑", value: "#2471a3" },
    { label: "초록", value: "#1e8449" },
    { label: "주황", value: "#d35400" },
    { label: "보라", value: "#7d3c98" },
  ];

  const applyFormat = (cmd, value = null) => {
    editRef.current?.focus();
    document.execCommand(cmd, false, value);
  };

  const btnStyle = {
    background: "#fff", border: "1px solid #d0c8bc", borderRadius: 6,
    padding: "4px 8px", fontSize: 12, cursor: "pointer", fontFamily: "sans-serif",
    color: "#2a1f14", lineHeight: 1,
  };

  return (
    <div style={{ background: "#f0ece4", borderBottom: "1px solid #e0d8cc", padding: "6px 10px", display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
      <button style={{ ...btnStyle, fontWeight: 700 }} onMouseDown={e => { e.preventDefault(); applyFormat("bold"); }} title="볼드">B</button>
      <button style={{ ...btnStyle, fontStyle: "italic" }} onMouseDown={e => { e.preventDefault(); applyFormat("italic"); }} title="기울임">I</button>
      <button style={{ ...btnStyle, textDecoration: "underline" }} onMouseDown={e => { e.preventDefault(); applyFormat("underline"); }} title="밑줄">U</button>
      <div style={{ width: 1, height: 20, background: "#d0c8bc", margin: "0 2px" }} />
      {COLORS.map(c => (
        <button
          key={c.value}
          title={c.label}
          onMouseDown={e => { e.preventDefault(); applyFormat("foreColor", c.value); }}
          style={{ width: 20, height: 20, borderRadius: "50%", background: c.value, border: c.value === "#2a1f14" ? "2px solid #999" : "2px solid transparent", cursor: "pointer", padding: 0 }}
        />
      ))}
      <div style={{ width: 1, height: 20, background: "#d0c8bc", margin: "0 2px" }} />
      <button style={{ ...btnStyle, fontSize: 11 }} onMouseDown={e => { e.preventDefault(); applyFormat("removeFormat"); }} title="서식 제거">✕서식</button>
      <div style={{ flex: 1 }} />
      <button style={{ ...btnStyle, background: "#2d4a3e", color: "#fff", border: "none", fontWeight: 700 }} onMouseDown={e => { e.preventDefault(); onSave(); }}>✅ 저장</button>
      <button style={{ ...btnStyle }} onMouseDown={e => { e.preventDefault(); onCancel(); }}>취소</button>
    </div>
  );
}

// 블록 렌더러 (편집 모드 지원)
function BlockViewer({ blocks, editable = false, onUpdate, onDelete, onRetryImage, onConvertToImage, onManualCrop }) {
  const [editingIdx, setEditingIdx] = React.useState(null);
  const editRef = React.useRef(null);

  if (!blocks?.length) return null;

  const startEdit = (i) => setEditingIdx(i);
  const confirmEdit = (i) => {
    const html = editRef.current?.innerHTML || "";
    onUpdate(i, html);
    setEditingIdx(null);
  };
  const cancelEdit = () => setEditingIdx(null);

  const hdr = { display: "flex", alignItems: "center", justifyContent: "space-between" };
  const iconBtn = (color = "#8a7a6a") => ({
    background: "none", border: "none", cursor: "pointer",
    fontSize: 13, color, padding: "2px 5px", borderRadius: 4,
    fontFamily: "sans-serif", lineHeight: 1,
  });

  // HTML 렌더링 여부 판단 (태그 포함 시 HTML로)
  const isHtml = (str) => Boolean(str && str.includes("<") && str.includes(">"));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {blocks.map((block, i) => {
        if (block.type === "text") {
          const isEditing = editingIdx === i;
          return (
            <div key={i} style={{ background: "#fdfbf8", border: `1.5px solid ${isEditing ? "#4a7c68" : "#e0d8cc"}`, borderRadius: 10, overflow: "hidden" }}>
              {editable && !isEditing && (
                <div style={{ ...hdr, background: "#f5f0e8", padding: "5px 10px", borderBottom: "1px solid #e8e0d5" }}>
                  <span style={{ fontSize: 10, color: "#8a7a6a", fontFamily: "sans-serif" }}>📝 텍스트</span>
                  <div style={{ display: "flex", gap: 2, alignItems: "center" }}>
                    <button style={iconBtn("#4a7c68")} onClick={() => startEdit(i)} title="수정">✏️</button>
                    {onConvertToImage && (
                      <button style={{ ...iconBtn("#8a6a2a"), fontSize: 10, background: "#f4ece0", borderRadius: 4, padding: "2px 6px" }} onClick={() => onConvertToImage(i)} title="이미지로 전환">🎨 그림</button>
                    )}
                    {onDelete && <button style={iconBtn("#c0392b")} onClick={() => onDelete(i)} title="삭제">🗑️</button>}
                  </div>
                </div>
              )}
              {isEditing && (
                <FormatToolbar editRef={editRef} onSave={() => confirmEdit(i)} onCancel={cancelEdit} />
              )}
              {block.converting
                ? <div style={{ padding: "20px", textAlign: "center" }}>
                    <div style={{ width: 18, height: 18, border: "2.5px solid #8a6a2a", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite", margin: "0 auto 8px" }} />
                    <div style={{ fontSize: 11, color: "#8a6a2a", fontFamily: "sans-serif" }}>그림 영역 찾는 중...</div>
                  </div>
                : isEditing
                  ? <div
                      ref={editRef}
                      contentEditable={true}
                      suppressContentEditableWarning={true}
                      dangerouslySetInnerHTML={{ __html: isHtml(block.content) ? block.content : block.content?.replace(/
/g, "<br/>") }}
                      style={{ padding: "12px 14px", fontSize: 13, lineHeight: 1.85, border: "none", outline: "none", minHeight: 100, fontFamily: "'Noto Serif KR',serif", background: "#fafff8", color: "#2a1f14" }}
                    />
                  : isHtml(block.content)
                    ? <div style={{ padding: "12px 14px", fontSize: 13, lineHeight: 1.85, color: "#2a1f14", fontFamily: "'Noto Serif KR',serif" }} dangerouslySetInnerHTML={{ __html: block.content }} />
                    : <div style={{ padding: "12px 14px", fontSize: 13, lineHeight: 1.85, color: "#2a1f14", whiteSpace: "pre-wrap", fontFamily: "'Noto Serif KR',serif" }}>
                        {block.content}
                      </div>
              }
            </div>
          );
        }

        if (block.type === "image") {
          const hasImage = !!block.croppedDataUrl;
          const isRetrying = block.retrying;
          return (
            <div key={i} style={{ borderRadius: 10, overflow: "hidden", border: "1px solid #d4c4a8" }}>
              <div style={{ ...hdr, background: "#3d5f50", padding: "6px 12px" }}>
                <span style={{ fontSize: 10, color: "#e8dcc8", fontFamily: "sans-serif", fontWeight: 700 }}>🎨 {block.label}</span>
                {editable && (
                  <div style={{ display: "flex", gap: 2 }}>
                    {onRetryImage && <button
                      style={{ ...iconBtn("#e8dcc8"), fontSize: 11 }}
                      onClick={() => onRetryImage(i)}
                      title="AI 재시도"
                      disabled={isRetrying}>
                      {isRetrying ? "⏳" : "🔄"}
                    </button>}
                    {onManualCrop && (
                      <button
                        style={{ ...iconBtn("#ffe8a0"), fontSize: 11, background: "rgba(255,220,80,0.2)", borderRadius: 4, padding: "2px 6px" }}
                        onClick={() => onManualCrop(i)}
                        title="직접 영역 선택">
                        ✂️ 직접
                      </button>
                    )}
                    {onDelete && <button style={{ ...iconBtn("#ffaaaa"), fontSize: 11 }} onClick={() => onDelete(i)} title="삭제">🗑️</button>}
                  </div>
                )}
              </div>
              {isRetrying && (
                <div style={{ background: "#f0f7f4", padding: "20px", textAlign: "center" }}>
                  <div style={{ width: 20, height: 20, border: "2.5px solid #2d4a3e", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite", margin: "0 auto 8px" }} />
                  <div style={{ fontSize: 12, color: "#6a9a88", fontFamily: "sans-serif" }}>크롭 재시도 중...</div>
                </div>
              )}
              {!isRetrying && hasImage && (
                <img src={block.croppedDataUrl} alt={block.label} style={{ width: "100%", display: "block" }} />
              )}
              {!isRetrying && !hasImage && (
                <div style={{ background: "#fff8f0", padding: "16px", textAlign: "center", fontSize: 12, color: "#c0392b", fontFamily: "sans-serif" }}>
                  ⚠️ 크롭 실패 — 재시도 버튼을 눌러주세요
                </div>
              )}
            </div>
          );
        }
        return null;
      })}
    </div>
  );
}

// 이미지 한 장의 상태: idle | analyzing | done | error
function ImageCard({ imgData, index, onRemove, onMoveUp, onMoveDown, isFirst, isLast, onUpdateBlock, onDeleteBlock, onRetryImage, onConvertToImage, onManualCrop, onReanalyze }) {
  const { preview, status, blocks, pageLabel } = imgData;
  const imgCount = blocks?.filter(b => b.type === "image").length || 0;
  const txtCount = blocks?.filter(b => b.type === "text").length || 0;

  return (
    <div style={{ background: "#fff", border: "1.5px solid #e0d8cc", borderRadius: 14, overflow: "hidden", marginBottom: 12 }}>
      {/* 상단 헤더 */}
      <div style={{ background: "#2d4a3e", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ color: "#e8dcc8", fontSize: 12, fontWeight: 700, fontFamily: "sans-serif" }}>
          📄 {pageLabel || `페이지 ${index + 1}`}
        </span>
        <div style={{ display: "flex", gap: 6 }}>
          {!isFirst && <button onClick={onMoveUp} style={btnStyle}>↑</button>}
          {!isLast && <button onClick={onMoveDown} style={btnStyle}>↓</button>}
          <button onClick={onRemove} style={{ ...btnStyle, background: "rgba(200,60,60,0.5)" }}>✕</button>
        </div>
      </div>

      {/* 썸네일 */}
      <div style={{ position: "relative" }}>
        <img src={preview} alt="페이지" style={{ width: "100%", maxHeight: 160, objectFit: "cover", display: "block" }} />
        {status === "analyzing" && (
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <div style={{ width: 24, height: 24, border: "3px solid #e8dcc8", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
            <span style={{ color: "#e8dcc8", fontSize: 12, fontFamily: "sans-serif" }}>분석 중...</span>
          </div>
        )}
      </div>

      {/* 분석 결과 */}
      {status === "done" && blocks?.length > 0 && (
        <div style={{ padding: "12px 12px 14px" }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
            {txtCount > 0 && <span style={{ background: "#e8f4f0", color: "#2d6a58", fontSize: 10, padding: "2px 8px", borderRadius: 20, fontFamily: "sans-serif" }}>📝 {txtCount}개</span>}
            {imgCount > 0 && <span style={{ background: "#f4ece0", color: "#7a5a2a", fontSize: 10, padding: "2px 8px", borderRadius: 20, fontFamily: "sans-serif" }}>🎨 {imgCount}개</span>}
          </div>
          <BlockViewer
            blocks={blocks}
            editable={true}
            onUpdate={onUpdateBlock}
            onDelete={onDeleteBlock}
            onRetryImage={onRetryImage}
            onConvertToImage={onConvertToImage}
            onManualCrop={onManualCrop}
          />
        </div>
      )}
      {status === "error" && (
        <div style={{ padding: "14px 12px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff5f5" }}>
          <span style={{ fontSize: 12, color: "#c0392b", fontFamily: "sans-serif" }}>⚠️ 분석 실패</span>
          <button
            onClick={() => onReanalyze && onReanalyze()}
            style={{ fontSize: 12, color: "#fff", background: "#c0392b", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontFamily: "sans-serif" }}>
            🔄 이 장만 재시도
          </button>
        </div>
      )}
    </div>
  );
}

const btnStyle = { background: "rgba(255,255,255,0.2)", border: "none", color: "#e8dcc8", borderRadius: 5, padding: "3px 7px", fontSize: 11, cursor: "pointer", fontFamily: "sans-serif" };

function App() {
  const [screen, setScreen] = React.useState("home");
  const [user, setUser] = React.useState(null);
  const [authLoading, setAuthLoading] = React.useState(true);
  const [entries, setEntries] = React.useState([]);
  const [entriesLoading, setEntriesLoading] = React.useState(false);
  const [selected, setSelected] = React.useState(null);

  const [title, setTitle] = React.useState("");

  const [questions, setQuestions] = React.useState([{ q: "", a: "" }]);
  const [saving, setSaving] = React.useState(false);

  const [editingId, setEditingId] = React.useState(null);

  const fbRef = React.useRef(null);

  // Firebase 초기화 + 로그인 상태 감지
  React.useEffect(() => {
    const { initializeApp } = window.FirebaseApp;
    const { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, query, orderBy } = window.FirebaseFirestore;
    const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.FirebaseAuth;

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    fbRef.current = { db, auth, provider, collection, doc, getDocs, setDoc, deleteDoc, query, orderBy, signInWithPopup, signOut };

    onAuthStateChanged(auth, (u) => {
      setUser(u);
      setAuthLoading(false);
    });
  }, []);

  // 로그인 후 데이터 불러오기
  React.useEffect(() => {
    if (!user) return;
    loadEntries();
  }, [user]);

  const loadEntries = async () => {
    if (!fbRef.current || !user) return;
    setEntriesLoading(true);
    const { db, collection, getDocs, query, orderBy } = fbRef.current;
    try {
      const q = query(collection(db, "users", user.uid, "entries"), orderBy("date", "desc"));
      const snap = await getDocs(q);
      setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    } catch(e) { console.error(e); }
    setEntriesLoading(false);
  };

  const signIn = async () => {
    const { auth, provider, signInWithPopup } = fbRef.current;
    await signInWithPopup(auth, provider);
  };

// JSON 파일 가져오기 버튼
function ImportButton({ user, fbRef, onImport }) {
  const [importing, setImporting] = React.useState(false);
  const fileRef = React.useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file || !user || !fbRef.current) return;
    setImporting(true);
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error("잘못된 파일 형식");
      const { db, doc, setDoc } = fbRef.current;
      for (const entry of data) {
        await setDoc(doc(db, "users", user.uid, "entries", String(entry.id)), {
          date: entry.date || new Date().toISOString(),
          title: entry.title || "제목 없음",
          pages: (entry.pages || []).map(p => ({
            pageLabel: p.pageLabel || "",
            blocks: (p.blocks || []).filter(b => b.type === "text").map(b => ({ type: "text", content: b.content })),
          })).filter(p => p.blocks.length > 0),
          allBlocks: (entry.allBlocks || []).filter(b => b.type === "text"),
          questions: entry.questions || [],
        });
      }
      await onImport();
      alert(`✅ ${data.length}개의 기록을 가져왔어요!`);
    } catch(e) {
      console.error(e);
      alert("가져오기 실패. 올바른 JSON 파일인지 확인해주세요.");
    }
    setImporting(false);
    e.target.value = "";
  };

  return (
    <>
      <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleFile} />
      <button
        onClick={() => fileRef.current?.click()}
        disabled={importing}
        style={{ width: 46, height: 46, borderRadius: "50%", background: "#fff", border: "2px solid #2d4a3e", color: "#2d4a3e", fontSize: 20, cursor: "pointer", boxShadow: "0 4px 16px rgba(0,0,0,0.12)", display: "flex", alignItems: "center", justifyContent: "center", opacity: importing ? 0.6 : 1 }}
        title="JSON 파일로 가져오기">
        {importing ? "⏳" : "📥"}
      </button>
    </>
  );
}

// localStorage → Firebase 마이그레이션 버튼
function MigrateButton({ user, fbRef, onMigrate }) {
  const [status, setStatus] = React.useState("idle"); // idle | found | migrating | done | none
  const [count, setCount] = React.useState(0);

  React.useEffect(() => {
    try {
      const old = localStorage.getItem("bible_study_entries");
      if (old) {
        const parsed = JSON.parse(old);
        if (Array.isArray(parsed) && parsed.length > 0) {
          setCount(parsed.length);
          setStatus("found");
        }
      }
    } catch {}
  }, []);

  if (status === "idle" || status === "none") return null;
  if (status === "done") return (
    <div style={{ background: "#f0f7f4", border: "1px solid #c8ddd5", borderRadius: 12, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "#2d4a3e", fontFamily: "sans-serif", textAlign: "center" }}>
      ✅ 이전 기록 {count}개를 Firebase로 옮겼어요!
    </div>
  );

  return (
    <div style={{ background: "#fff9ee", border: "1px solid #f0d890", borderRadius: 12, padding: "14px 16px", marginBottom: 16, fontFamily: "sans-serif" }}>
      <div style={{ fontSize: 13, color: "#7a5f00", marginBottom: 10, lineHeight: 1.6 }}>
        📦 이 기기에서 저장한 기록 <strong>{count}개</strong>를 발견했어요.<br/>
        Firebase로 옮기면 모든 기기에서 볼 수 있어요.
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <button
          disabled={status === "migrating"}
          onClick={async () => {
            if (!user || !fbRef.current) return;
            setStatus("migrating");
            try {
              const { db, doc, setDoc } = fbRef.current;
              const raw = localStorage.getItem("bible_study_entries");
              const parsed = JSON.parse(raw);
              const cleaned = parsed.map(e => ({
                ...e,
                pages: (e.pages || []).map(p => ({
                  pageLabel: p.pageLabel,
                  blocks: (p.blocks || []).filter(b => b.type === "text").map(b => ({ type: "text", content: b.content })),
                })).filter(p => p.blocks.length > 0),
                allBlocks: (e.allBlocks || []).filter(b => b.type === "text"),
              }));
              for (const entry of cleaned) {
                await setDoc(doc(db, "users", user.uid, "entries", String(entry.id)), {
                  date: entry.date || new Date().toISOString(),
                  title: entry.title || "제목 없음",
                  pages: entry.pages || [],
                  allBlocks: entry.allBlocks || [],
                  questions: entry.questions || [],
                });
              }
              setCount(cleaned.length);
              setStatus("done");
              await onMigrate();
            } catch(e) {
              console.error(e);
              setStatus("found");
              alert("마이그레이션 중 오류가 발생했어요.");
            }
          }}
          style={{ flex: 1, padding: "10px", borderRadius: 10, background: "linear-gradient(135deg,#2d4a3e,#4a7c68)", color: "#fff", border: "none", fontSize: 13, fontWeight: 700, cursor: "pointer", opacity: status === "migrating" ? 0.7 : 1 }}>
          {status === "migrating" ? "옮기는 중..." : "✨ Firebase로 옮기기"}
        </button>
        <button
          onClick={() => setStatus("none")}
          style={{ padding: "10px 14px", borderRadius: 10, background: "#f0ece4", color: "#7a6a55", border: "none", fontSize: 13, cursor: "pointer" }}>
          무시
        </button>
      </div>
    </div>
  );
}

// 보기 화면 질문&답변 컴포넌트 (답변 인라인 수정 가능)
function ViewQuestions({ questions, onSaveAnswer }) {
  const [editingIdx, setEditingIdx] = React.useState(null);
  const [editValue, setEditValue] = React.useState("");

  const startEdit = (i, current) => { setEditingIdx(i); setEditValue(current || ""); };
  const cancelEdit = () => setEditingIdx(null);
  const confirmEdit = (i) => { onSaveAnswer(i, editValue); setEditingIdx(null); };

  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 11, color: "#8a7a6a", fontFamily: "sans-serif", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 10 }}>
        묵상 질문 & 답변
      </div>
      {questions.map((q, i) => (
        <div key={i} style={{ background: "#fdf8f2", border: "1px solid #ede5d8", borderRadius: 12, padding: 16, marginBottom: 12 }}>
          {/* 질문 */}
          <div style={{ fontSize: 12, color: "#8a7a6a", fontFamily: "sans-serif", marginBottom: 6 }}>Q{i + 1}</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#2d4a3e", marginBottom: 12, lineHeight: 1.6 }}>{q.q}</div>

          {/* 답변 영역 */}
          {editingIdx === i ? (
            <div>
              <textarea
                autoFocus
                value={editValue}
                onChange={e => setEditValue(e.target.value)}
                placeholder="묵상 답변을 입력하세요..."
                style={{ width: "100%", minHeight: 100, padding: "12px 14px", fontSize: 14, lineHeight: 1.7, border: "1.5px solid #4a7c68", borderRadius: 10, outline: "none", resize: "vertical", fontFamily: "'Noto Serif KR',serif", background: "#fafff8", boxSizing: "border-box", color: "#2a1f14" }}
              />
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <button
                  onClick={() => confirmEdit(i)}
                  style={{ flex: 1, padding: "10px", borderRadius: 10, background: "linear-gradient(135deg,#2d4a3e,#4a7c68)", color: "#fff", border: "none", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>
                  ✅ 저장
                </button>
                <button
                  onClick={cancelEdit}
                  style={{ padding: "10px 16px", borderRadius: 10, background: "#ede5d8", color: "#7a6a55", border: "none", fontSize: 14, cursor: "pointer", fontFamily: "sans-serif" }}>
                  취소
                </button>
              </div>
            </div>
          ) : (
            <div>
              {q.a
                ? <div style={{ fontSize: 14, color: "#4a3a2a", lineHeight: 1.7, background: "#fff", borderRadius: 8, padding: "12px 14px", marginBottom: 8 }}>{q.a}</div>
                : <div style={{ fontSize: 13, color: "#b0a090", fontStyle: "italic", marginBottom: 8, padding: "10px 0" }}>— 아직 답변이 없어요</div>
              }
              <button
                onClick={() => startEdit(i, q.a)}
                style={{ fontSize: 12, color: "#4a7c68", background: "none", border: "1px solid #c8ddd5", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontFamily: "sans-serif" }}>
                {q.a ? "✏️ 답변 수정" : "✏️ 답변 작성"}
              </button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// 보기 화면: 페이지 탭 뷰
function PagedView({ pages }) {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const active = pages[activeIdx];
  return (
    <div style={{ marginBottom: 20 }}>
      {/* 탭 */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, overflowX: "auto", paddingBottom: 4 }}>
        {pages.map((p, i) => (
          <button key={i} onClick={() => setActiveIdx(i)} style={{
            flexShrink: 0, padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer",
            background: activeIdx === i ? "#2d4a3e" : "#e8e0d5",
            color: activeIdx === i ? "#e8dcc8" : "#7a6a55",
            fontSize: 12, fontFamily: "sans-serif", fontWeight: 600,
          }}>
            {p.pageLabel || `페이지 ${i + 1}`}
          </button>
        ))}
      </div>
      {/* 선택된 페이지 블록 */}
      {active?.blocks?.length > 0
        ? <BlockViewer blocks={active.blocks} />
        : <div style={{ color: "#a89a88", fontSize: 13, fontStyle: "italic" }}>내용 없음</div>}
    </div>
  );
}

    // Firebase 로드 후 React 마운트
    function mountApp() {
      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    }

    if (window._firebaseReady) {
      mountApp();
    } else {
      window.addEventListener("firebase-ready", mountApp, { once: true });
      // 타임아웃 폴백
      setTimeout(() => { if (!window._appMounted) mountApp(); }, 3000);
    }
    window._appMounted = true;
  </script>
</body>
